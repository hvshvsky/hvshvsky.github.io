<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D's Diary</title>

<style>

body{
    margin:0;
    background:#faf9f7;
    font-family:Arial, sans-serif;
    color:#2d2d2d;
}

header{
    text-align:center;
    padding:70px 20px;
}

h1{
    font-size:3rem;
    margin:0;
}

.subtitle{
    color:#777;
    margin-top:10px;
}

.decor{
    width:120px;
    height:10px;
    margin:20px auto;
    border-radius:999px;
    background:linear-gradient(
    90deg,
    #b8dcff,
    #ffd8e7,
    #fff1ba,
    #d7c9ff
    );
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.post{
    background:white;
    border-radius:24px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.date{
    color:#999;
    font-size:14px;
}

.post h2{
    margin-top:10px;
}

footer{
    text-align:center;
    padding:40px;
    color:#999;
}

</style>

</head>
<body>

<header>
<h1>D's Diary</h1>

<div class="decor"></div>

<p class="subtitle">
личный уголок интернета
</p>
</header>

<div class="container">

<div class="post">
<div class="date">9 июня 2026</div>
<h2>Первый пост</h2>

<p>
Если ты читаешь это, значит сайт уже работает 🎉
</p>
</div>

<div class="post">
<div class="date">Запись</div>
<h2>Мои мысли</h2>

<p>
Сюда можно писать что угодно.
</p>
</div>

</div>

<footer>
made with ☁️
</footer>

</body>
</html>
